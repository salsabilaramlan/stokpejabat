<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Carian Kad Stok</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8 relative min-h-screen">

    <!-- Sistem Modal UI (Pop-up) -->
    <div id="sys-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform scale-100">
            <div id="modal-header" class="p-4 border-b bg-slate-50 border-slate-100 text-slate-700 flex justify-between items-center">
                <h3 class="font-bold flex items-center gap-2">
                    <svg id="modal-icon-error" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <span id="modal-title">Ralat</span>
                </h3>
                <button onclick="document.getElementById('sys-modal').classList.add('hidden')" class="p-1 hover:bg-black/5 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="modal-desc" class="p-6 text-slate-600 leading-relaxed text-sm">
                <!-- Message -->
            </div>
            <div class="p-4 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button onclick="document.getElementById('sys-modal').classList.add('hidden')" class="px-5 py-2 font-medium text-white rounded-xl transition-colors bg-red-600 hover:bg-red-700">Tutup</button>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-400 to-indigo-500"></div>
            <div class="inline-flex items-center justify-center p-3 bg-blue-50 text-blue-600 rounded-2xl mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Sistem Carian Kad Stok</h1>
            <p class="text-slate-500 max-w-xl mx-auto text-sm mt-2">
                Pangkalan data inventori. Data dipaparkan secara terus dan pantas dari Google Sheets.
            </p>
        </header>

        <!-- Bahagian Carian & Kawalan -->
        <section class="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 md:p-6">
            <div class="flex flex-col md:flex-row gap-3">
                <!-- Kotak Carian -->
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <input type="text" id="search-input" onkeyup="filterTable()" class="block w-full p-4 pl-12 text-base text-slate-900 border border-slate-200 rounded-2xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" placeholder="Cari nama item, no kad, atau lokasi...">
                </div>
                
                <!-- Butang Segerak (Manual Sync) -->
                <button id="btn-sync" onclick="fetchData(false)" class="flex items-center justify-center px-6 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 active:scale-[0.98] rounded-2xl font-semibold transition-all whitespace-nowrap">
                    <svg id="icon-sync" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    <span id="text-sync">Segerak Kini</span>
                </button>
            </div>

            <!-- Status Bar Bawah Carian -->
            <div class="mt-4 flex flex-wrap justify-between items-center px-2">
                <div class="flex items-center gap-2">
                    <span id="status-count" class="inline-flex items-center px-3 py-1 rounded-lg text-xs font-bold bg-emerald-100 text-emerald-700">
                        0 Rekod
                    </span>
                    <span id="status-sync-time" class="text-xs font-medium text-slate-400">Menunggu data...</span>
                </div>
                <div id="mini-loading" class="hidden text-xs font-semibold text-blue-500 flex items-center">
                    <svg class="spinner w-3 h-3 mr-1.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Menyemak kemas kini...
                </div>
            </div>
        </section>

        <!-- Bahagian Jadual Data -->
        <section id="sec-table-container" class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto hide-scrollbar">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th scope="col" class="px-6 py-5 font-bold w-24 whitespace-nowrap">No. Kad</th>
                            <th scope="col" class="px-6 py-5 font-bold">Perihal Stok (Nama Item)</th>
                            <th scope="col" class="px-6 py-5 font-bold w-48">Lokasi Stok</th>
                            <th scope="col" class="px-6 py-5 font-bold w-48">Rujukan (Sheet)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                        <!-- Data will be inserted here -->
                        <tr>
                            <td colspan="4" class="px-6 py-12 text-center text-slate-400">
                                Memuatkan data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="bg-slate-50 border-t border-slate-200 px-6 py-4 text-xs font-medium text-slate-500 text-center sm:text-right" id="status-showing">
                Menunjukkan 0 item.
            </div>
        </section>

    </div>

    <!-- SCRIPT LOGIK SISTEM -->
    <script>
        // PAUTAN APPS SCRIPT DITANAM DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby8a5t5YXn4lpuKu16pzGyD1K7n2JLZkDIaT5_qg1-wOTKClZUqWYqodoBfdjnCQMBM/exec';
        
        let appData = [];

        // Dijalankan sebaik sahaja laman web dibuka
        window.onload = function() {
            // Cuba baca data dari "Cache" supaya paparan serta merta (tidak lambat)
            const cachedData = localStorage.getItem('kadStokData');
            const cachedTime = localStorage.getItem('kadStokSyncTime');

            if (cachedData && cachedData !== "[]") {
                appData = JSON.parse(cachedData);
                document.getElementById('status-sync-time').innerText = `Kemas kini terakhir: ${cachedTime}`;
                renderUI();
                
                // Secara senyap (background), sistem akan semak jika ada data baru
                fetchData(true); 
            } else {
                // Jika pertama kali buka, loading seperti biasa
                fetchData(false);
            }
        };

        // --- Fungsi Untuk Format Nombor Kad Dengan Tepat ---
        function cleanNoKad(kadString) {
            if (!kadString || kadString === '-') return '-';
            
            // Format asal dari CSV selalunya seperti "1, 58" atau "1,150"
            // Kita cuma nak nombor yang dibelakang sahaja.
            const parts = kadString.split(',');
            let lastPart = parts[parts.length - 1].trim();
            
            // Sekiranya ada teks 'No. Kad:' yang terselit, kita buang
            lastPart = lastPart.replace(/No\.?\s*Kad:?/gi, '').trim();
            
            return lastPart || '-';
        }

        // --- Teras Fetch Data dari Google Sheets ---
        async function fetchData(isBackground = false) {
            const btnSync = document.getElementById('btn-sync');
            const iconSync = document.getElementById('icon-sync');
            const textSync = document.getElementById('text-sync');
            const miniLoading = document.getElementById('mini-loading');

            if (!isBackground) {
                btnSync.disabled = true;
                iconSync.classList.add('spinner');
                textSync.innerText = "Menyegerak...";
            } else {
                miniLoading.classList.remove('hidden');
            }

            try {
                // Bypass cache internet pelayar
                const fetchUrl = SCRIPT_URL + '?t=' + new Date().getTime();
                const response = await fetch(fetchUrl);
                
                if (!response.ok) throw new Error("Gagal menyambung ke pangkalan data.");
                
                const data = await response.json();
                if (!Array.isArray(data)) throw new Error("Format data tidak disokong.");

                appData = data.map((item, idx) => ({
                    id: 'gas-' + idx,
                    fileName: item.fileName || '-',
                    noKad: cleanNoKad(item.noKad), // Format nombor diaplikasikan di sini
                    itemName: item.itemName || '-',
                    lokasi: item.lokasi || '-'
                }));

                const timeStr = new Date().toLocaleTimeString();
                document.getElementById('status-sync-time').innerText = `Kemas kini terkini: ${timeStr}`;
                
                // Simpan ke dalam Cache (Local Storage) untuk kegunaan pembukaan seterusnya
                localStorage.setItem('kadStokData', JSON.stringify(appData));
                localStorage.setItem('kadStokSyncTime', timeStr);

                renderUI();

            } catch (error) {
                if (!isBackground) {
                    showErrorModal('Gagal memuat turun data. Sila pastikan pautan Apps Script masih berfungsi.');
                }
                console.error(error);
            }

            // Kembalikan UI butang ke asal
            if (!isBackground) {
                btnSync.disabled = false;
                iconSync.classList.remove('spinner');
                textSync.innerText = "Segerak Kini";
            } else {
                miniLoading.classList.add('hidden');
            }
        }

        // --- Fungsi Render & Carian UI ---
        function renderUI() {
            const statusCount = document.getElementById('status-count');
            statusCount.innerText = `${appData.length} Rekod`;
            filterTable(); // Papar data ke dalam jadual
        }

        function filterTable() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const tbody = document.getElementById('table-body');
            const statusShowing = document.getElementById('status-showing');

            const filtered = appData.filter(item => 
                item.itemName.toLowerCase().includes(term) ||
                item.noKad.toLowerCase().includes(term) ||
                item.lokasi.toLowerCase().includes(term) ||
                item.fileName.toLowerCase().includes(term)
            );

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="px-6 py-16 text-center">
                            <div class="inline-flex items-center justify-center p-4 bg-slate-100 rounded-full mb-4">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            </div>
                            <p class="text-slate-600 font-medium text-lg">Tiada rekod ditemui</p>
                            <p class="text-slate-400 mt-1">Cuba kata kunci carian yang lain.</p>
                        </td>
                    </tr>`;
            } else {
                tbody.innerHTML = filtered.map(item => `
                    <tr class="hover:bg-blue-50/50 transition-colors border-b border-slate-100 group">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="inline-flex items-center justify-center px-3 py-1.5 text-sm font-bold text-blue-800 bg-blue-100 rounded-lg border border-blue-200">
                                ${escapeHtml(item.noKad)}
                            </span>
                        </td>
                        <td class="px-6 py-4 font-semibold text-slate-800 text-base min-w-[200px]">${escapeHtml(item.itemName)}</td>
                        <td class="px-6 py-4 text-slate-600 font-medium">${escapeHtml(item.lokasi)}</td>
                        <td class="px-6 py-4 text-slate-400 font-mono text-xs">${escapeHtml(item.fileName)}</td>
                    </tr>
                `).join('');
            }

            statusShowing.innerText = `Menunjukkan ${filtered.length} daripada ${appData.length} item keseluruhan.`;
        }

        // Fungsi Keselamatan & Modal
        function escapeHtml(unsafe) {
            if(!unsafe) return "";
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function showErrorModal(message) {
            const modal = document.getElementById('sys-modal');
            const mDesc = document.getElementById('modal-desc');
            mDesc.innerHTML = message;
            modal.classList.remove('hidden');
        }

    </script>
</body>
</html>
